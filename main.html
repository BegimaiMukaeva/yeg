<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stairhoppers Movers - Design Options</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap");

    :root {
      --bg: #f5f3f0;
      --bg-soft: #ffffff;
      --card: #ffffff;
      --text: #002336;
      --muted: #4a6574;
      --base: #002336;
      --accent: #f49924;
      --accent-2: #ffb24e;
      --border: rgba(0, 35, 54, 0.14);
      --shadow: 0 16px 36px rgba(0, 35, 54, 0.16);
      --ring: rgba(244, 153, 36, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(244, 153, 36, 0.2) 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, rgba(0, 35, 54, 0.12) 0%, transparent 40%),
        var(--bg);
      background-size: 140% 140%;
      animation: bgFlow 14s ease-in-out infinite alternate;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 980px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(250, 252, 253, 0.95));
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: -80px;
      background: radial-gradient(circle, rgba(244, 153, 36, 0.16), transparent 55%);
      filter: blur(18px);
      z-index: -1;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .hero {
      padding: 40px 28px 24px;
      border-bottom: 1px solid rgba(0, 35, 54, 0.12);
      background: linear-gradient(120deg, rgba(244, 153, 36, 0.18), rgba(244, 153, 36, 0.04));
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(244, 153, 36, 0.2);
      border: 1px solid rgba(244, 153, 36, 0.5);
      border-radius: 999px;
      padding: 6px 10px;
      margin-bottom: 14px;
      animation: pulseSoft 2.8s ease-in-out infinite;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.15;
      font-family: "Sora", "Manrope", "Segoe UI", sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 0 22px rgba(244, 153, 36, 0.18);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 700px;
      font-size: 16px;
      line-height: 1.6;
    }

    .options {
      padding: 26px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(0, 35, 54, 0.12);
      border-radius: 14px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: translateY(18px) scale(0.98);
      animation: cardIn 0.65s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.08s; }
    .card:nth-child(2) { animation-delay: 0.16s; }
    .card:nth-child(3) { animation-delay: 0.24s; }
    .card:nth-child(4) { animation-delay: 0.32s; }

    .card:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: rgba(244, 153, 36, 0.75);
      background: rgba(244, 153, 36, 0.08);
      box-shadow: 0 0 0 1px var(--ring), 0 12px 30px rgba(0, 35, 54, 0.2);
    }

    .card h2 {
      margin: 0;
      font-size: 20px;
      font-family: "Sora", "Manrope", "Segoe UI", sans-serif;
      font-weight: 700;
    }

    .card a {
      display: inline-block;
      align-self: flex-start;
      margin-top: auto;
      text-decoration: none;
      color: #ffffff;
      background: linear-gradient(135deg, var(--base), #0a3f5d);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.01em;
      transition: filter 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(0, 35, 54, 0.32);
    }

    .card a:hover {
      filter: none;
      transform: translateY(-1px);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #002336;
      box-shadow: 0 12px 24px rgba(244, 153, 36, 0.35);
    }

    .footer {
      padding: 0 26px 24px;
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes bgFlow {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(16px, -12px) scale(1.08); }
    }

    @keyframes pulseSoft {
      0%, 100% { box-shadow: 0 0 0 0 rgba(244, 153, 36, 0.15); }
      50% { box-shadow: 0 0 0 10px rgba(244, 153, 36, 0); }
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <span class="badge">Stairhoppers Movers</span>
      <h1>Choose a Design Direction</h1>
      <p class="subtitle">
        Explore four visual options and open the one that fits your style best.
      </p>
    </section>

    <section class="options">
      <article class="card">
        <h2>Option 1</h2>
        <a href="./block.html" target="_blank" rel="noopener noreferrer">Open Option</a>
      </article>

      <article class="card">
        <h2>Option 2</h2>
        <a href="./second.html" target="_blank" rel="noopener noreferrer">Open Option</a>
      </article>

      <article class="card">
        <h2>Option 3</h2>
        <a href="./estimate.html" target="_blank" rel="noopener noreferrer">Open Option</a>
      </article>

      <article class="card">
        <h2>Option 4</h2>
        <a href="./variant.html" target="_blank" rel="noopener noreferrer">Open Option</a>
      </article>
    </section>

    <p class="footer">
      Select a card to continue.
    </p>
  </main>
</body>
</html>
